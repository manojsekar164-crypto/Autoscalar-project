name: AutoScaler CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

     - name: Docker Login
  run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/project6-frontend ./frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/project6-backend ./backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/project6-ml-service ./ml-service

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/project6-frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/project6-backend
          docker push ${{ secrets.DOCKER_USERNAME }}/project6-ml-service
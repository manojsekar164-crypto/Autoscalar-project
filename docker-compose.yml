version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: autoscaler-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - autoscaler-network

  # Backend API (Node.js)
  backend:
    build: ./backend
    container_name: autoscaler-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/autoscaler
      - ML_SERVICE_URL=http://ml-service:5000
    depends_on:
      - mongodb
      - ml-service
    networks:
      - autoscaler-network
    restart: unless-stopped

  # ML Service (Python Flask)
  ml-service:
    build: ./ml-service
    container_name: autoscaler-ml
    ports:
      - "5000:5000"
    networks:
      - autoscaler-network
    restart: unless-stopped

  # Frontend (React) - Development
  frontend:
    build: ./frontend
    container_name: autoscaler-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:4000/api
    depends_on:
      - backend
    networks:
      - autoscaler-network
    stdin_open: true
    tty: true

networks:
  autoscaler-network:
    driver: bridge

volumes:
  mongodb_data:
